<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>
  <style>
    @import url("https://esm.sh/@xyflow/react/dist/style.css");

    :root {
      --bg: #f5f8fc;
      --panel: rgba(255, 255, 255, 0.92);
      --border: rgba(148, 163, 184, 0.24);
      --text: #0f172a;
      --muted: #475569;
      --shadow: 0 24px 64px rgba(148, 163, 184, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 24%),
        radial-gradient(circle at top right, rgba(168, 85, 247, 0.08), transparent 18%),
        linear-gradient(180deg, #fbfdff, #eef5fb 42%, #f8fafc);
    }

    .shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 32px 24px 40px;
    }

    .hero {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 0.04em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 920px;
      font-size: 15px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.18fr) 360px;
      gap: 20px;
      align-items: start;
    }

    .diagram-panel,
    .side-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .diagram-panel { overflow: hidden; }

    .diagram-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 20px 20px 0;
    }

    .diagram-header h2,
    .side-panel h2,
    .section-title {
      margin: 0;
    }

    .diagram-header h2,
    .side-panel h2 {
      font-size: 18px;
    }

    .diagram-header p,
    .side-panel p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .chips,
    .stage-bar,
    .player {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chips {
      justify-content: flex-end;
      min-width: 220px;
    }

    .chip,
    .stage-button,
    .player button,
    .player .status {
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(255, 255, 255, 0.88);
      color: var(--muted);
      padding: 8px 12px;
    }

    .stage-bar,
    .player {
      padding: 18px 20px 0;
    }

    .stage-button,
    .player button {
      cursor: pointer;
    }

    .stage-button.active,
    .player button:hover {
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.94), rgba(56, 189, 248, 0.9));
      color: #ffffff;
      border-color: transparent;
    }

    .flow-shell {
      height: 640px;
      padding: 18px 14px 14px;
    }

    .react-flow {
      --xy-edge-stroke-default: rgba(71, 85, 105, 0.52);
      --xy-edge-stroke-width-default: 2.2px;
      background: radial-gradient(circle at top, rgba(14, 165, 233, 0.08), transparent 42%);
    }

    .react-flow__renderer {
      background: transparent;
    }

    .react-flow__attribution { display: none; }

    .react-flow__controls {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: none;
    }

    .react-flow__controls-button {
      background: transparent;
      border-bottom-color: rgba(148, 163, 184, 0.18);
      color: #334155;
    }

    .rf-node {
      width: 252px;
      min-height: 116px;
      padding: 16px 18px 14px;
      border-radius: 22px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.96));
      box-shadow: 0 12px 32px rgba(148, 163, 184, 0.12);
      transition: opacity 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .rf-node.dimmed {
      opacity: 0.38;
      transform: scale(0.98);
    }

    .rf-node.active {
      opacity: 1;
      transform: translateY(-2px);
      border-color: rgba(14, 165, 233, 0.88);
      box-shadow: 0 16px 36px rgba(14, 165, 233, 0.16);
    }

    .rf-node .eyebrow {
      font-size: 11px;
      line-height: 1.2;
      color: #0284c7;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .rf-node .title {
      font-size: 18px;
      line-height: 1.28;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .rf-node .subtitle,
    .rf-node .hint {
      font-size: 12px;
      line-height: 1.55;
      color: var(--muted);
      word-break: break-word;
    }

    .rf-node .hint {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(148, 163, 184, 0.14);
      font-size: 11px;
      color: #334155;
    }

    .side-panel {
      padding: 22px;
      display: grid;
      gap: 18px;
      position: sticky;
      top: 24px;
    }

    .summary,
    .detail-list li,
    .source-list li {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 16px;
    }

    .summary {
      padding: 16px;
    }

    .summary .tag {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(14, 165, 233, 0.1);
      color: #0369a1;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 13px;
      color: #0f172a;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .detail-list,
    .source-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .detail-list li,
    .source-list li {
      padding: 10px 12px;
      color: #334155;
      font-size: 13px;
      line-height: 1.6;
    }

    pre {
      margin: 0;
      padding: 14px 16px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid rgba(148, 163, 184, 0.18);
      color: #0f172a;
      font-size: 12px;
      line-height: 1.65;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .side-panel { position: static; }
      .flow-shell { height: 600px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import * as React from 'https://esm.sh/react@18.2.0'
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client'
    import dagre from 'https://esm.sh/dagre@0.8.5'
    import htm from 'https://esm.sh/htm@3.1.1'
    import {
      ReactFlow,
      Controls,
      Handle,
      MarkerType,
      Position,
      useEdgesState,
      useNodesState,
    } from 'https://esm.sh/@xyflow/react?deps=react@18.2.0,react-dom@18.2.0'

    const html = htm.bind(React.createElement)

    const stageConfigs = {{STAGES}}
    const baseNodes = {{NODES}}
    const baseEdges = {{EDGES}}

    function layoutGraph(nodes, edges) {
      const dagreGraph = new dagre.graphlib.Graph()
      dagreGraph.setDefaultEdgeLabel(() => ({}))
      dagreGraph.setGraph({ rankdir: 'LR', ranksep: 96, nodesep: 40, marginx: 24, marginy: 24 })

      nodes.forEach((node) => {
        dagreGraph.setNode(node.id, {
          width: node.data.width || 252,
          height: node.data.height || 116,
        })
      })

      edges.forEach((edge) => dagreGraph.setEdge(edge.source, edge.target))
      dagre.layout(dagreGraph)

      return nodes.map((node) => {
        const width = node.data.width || 252
        const height = node.data.height || 116
        const position = dagreGraph.node(node.id)

        return {
          ...node,
          position: { x: position.x - width / 2, y: position.y - height / 2 },
          sourcePosition: Position.Right,
          targetPosition: Position.Left,
        }
      })
    }

    function InfoNode({ data }) {
      const className = ['rf-node', data.active ? 'active' : '', data.dimmed ? 'dimmed' : '']
        .filter(Boolean)
        .join(' ')

      return html`
        <div className=${className}>
          <${Handle} type="target" position=${Position.Left} style=${{ opacity: 0 }} />
          <div className="eyebrow">${data.eyebrow}</div>
          <div className="title">${data.title}</div>
          <div className="subtitle">${data.subtitle}</div>
          ${data.hint ? html`<div className="hint">${data.hint}</div>` : null}
          <${Handle} type="source" position=${Position.Right} style=${{ opacity: 0 }} />
        </div>
      `
    }

    const nodeTypes = { info: InfoNode }

    function buildGraph(activeStage) {
      const stage = stageConfigs.find((item) => item.id === activeStage)

      const nodes = baseNodes.map((node) => ({
        ...node,
        data: {
          ...node.data,
          active: stage.focusNodes.includes(node.id),
          dimmed: !stage.focusNodes.includes(node.id),
        },
      }))

      const edges = baseEdges.map((edge) => {
        const active = stage.focusEdges.includes(edge.id)
        return {
          ...edge,
          type: 'smoothstep',
          animated: active,
          labelStyle: {
            fill: active ? '#0f172a' : '#475569',
            fontSize: 12,
            fontWeight: 500,
          },
          labelBgStyle: {
            fill: active ? 'rgba(255, 255, 255, 0.98)' : 'rgba(255, 255, 255, 0.92)',
            fillOpacity: 1,
          },
          labelBgPadding: [8, 5],
          labelBgBorderRadius: 8,
          style: {
            stroke: active ? '#0284c7' : 'rgba(71, 85, 105, 0.55)',
            strokeWidth: active ? 2.8 : 2.2,
          },
          markerEnd: {
            type: MarkerType.ArrowClosed,
            width: 18,
            height: 18,
            color: active ? '#0284c7' : 'rgba(71, 85, 105, 0.62)',
          },
        }
      })

      return { nodes: layoutGraph(nodes, edges), edges }
    }

    function App() {
      const [activeStage, setActiveStage] = React.useState(stageConfigs[0]?.id || 'stage-1')
      const [autoPlay, setAutoPlay] = React.useState(false)
      const stage = stageConfigs.find((item) => item.id === activeStage) || stageConfigs[0]
      const graph = React.useMemo(() => buildGraph(activeStage), [activeStage])
      const [nodes, setNodes, onNodesChange] = useNodesState(graph.nodes)
      const [edges, setEdges, onEdgesChange] = useEdgesState(graph.edges)

      React.useEffect(() => {
        const nextGraph = buildGraph(activeStage)
        setNodes(nextGraph.nodes)
        setEdges(nextGraph.edges)
      }, [activeStage, setEdges, setNodes])

      React.useEffect(() => {
        if (!autoPlay || stageConfigs.length <= 1) return undefined
        const currentIndex = stageConfigs.findIndex((item) => item.id === activeStage)
        const timer = window.setTimeout(() => {
          const next = stageConfigs[(currentIndex + 1) % stageConfigs.length]
          setActiveStage(next.id)
        }, 1800)
        return () => window.clearTimeout(timer)
      }, [activeStage, autoPlay])

      return html`
        <div className="shell">
          <section className="hero">
            <h1>{{TITLE}}</h1>
            <p>{{SUBTITLE}}</p>
          </section>

          <section className="layout">
            <div className="diagram-panel">
              <div className="diagram-header">
                <div>
                  <h2>${stage.headline}</h2>
                  <p>${stage.summary}</p>
                </div>
                <div className="chips">
                  <span className="chip">React Flow + dagre</span>
                  <span className="chip">auto layout</span>
                  <span className="chip">stage animation</span>
                  <span className="chip">light theme</span>
                  <span className="chip">draggable nodes</span>
                </div>
              </div>

              <div className="stage-bar">
                ${stageConfigs.map((item) => html`
                  <button
                    className=${['stage-button', item.id === activeStage ? 'active' : ''].filter(Boolean).join(' ')}
                    onClick=${() => setActiveStage(item.id)}
                  >
                    ${item.label}
                  </button>
                `)}
              </div>

              <div className="player">
                <button onClick=${() => setAutoPlay((value) => !value)}>
                  ${autoPlay ? '停止自动播放' : '自动播放'}
                </button>
                <div className="status">${stage.label}</div>
              </div>

              <div className="flow-shell">
                <${ReactFlow}
                  nodes=${nodes}
                  edges=${edges}
                  nodeTypes=${nodeTypes}
                  onNodesChange=${onNodesChange}
                  onEdgesChange=${onEdgesChange}
                  fitView=${true}
                  fitViewOptions=${{ padding: 0.18 }}
                  nodesDraggable=${true}
                  nodesConnectable=${false}
                  elementsSelectable=${true}
                  zoomOnScroll=${false}
                  preventScrolling=${false}
                  proOptions=${{ hideAttribution: true }}
                >
                  <${Controls} showInteractive=${false} />
                </${ReactFlow}>
              </div>
            </div>

            <aside className="side-panel">
              <div>
                <h2>阅读引导</h2>
                <p>{{GUIDE_TEXT}}</p>
              </div>

              <div className="summary">
                <div className="tag">${stage.label}</div>
                <p>${stage.summary}</p>
              </div>

              <div>
                <h3 className="section-title">当前阶段重点</h3>
                <ul className="detail-list">
                  ${stage.highlights.map((item) => html`<li>${item}</li>`)}
                </ul>
              </div>

              <div>
                <h3 className="section-title">当前载荷</h3>
                <pre>${stage.payload}</pre>
              </div>

              <div>
                <h3 className="section-title">源码依据</h3>
                <ul className="source-list">
                  ${stage.sources.map((item) => html`<li>${item}</li>`)}
                </ul>
              </div>
            </aside>
          </section>
        </div>
      `
    }

    createRoot(document.getElementById('app')).render(html`<${App} />`)
  </script>
</body>
</html>
